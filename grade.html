<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade — Maths Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <nav class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-current" id="bc-grade">…</span>
    </nav>

    <div class="page-head">
      <h1 class="page-title" id="grade-title">Loading…</h1>
    </div>

    <div class="cards-grid" id="topics-grid">
      <p class="loading">Loading…</p>
    </div>
  </div>

  <script>
    async function init() {
      const params    = new URLSearchParams(window.location.search);
      const gradeSlug = params.get('grade');
      const grid      = document.getElementById('topics-grid');

      try {
        const manifest = await fetch('manifest.json').then(r => r.json());
        const grade    = manifest.grades.find(g => g.slug === gradeSlug);

        if (!grade) {
          grid.innerHTML = '<p class="empty">Grade not found.</p>';
          return;
        }

        document.title = `${grade.title} — Maths Practice`;
        document.getElementById('bc-grade').textContent  = grade.title;
        document.getElementById('grade-title').textContent = grade.title;
        document.documentElement.style.setProperty('--topic-color', grade.color || '#6366f1');

        if (!grade.topics.length) {
          grid.innerHTML = '<p class="empty">No topics yet for this grade.</p>';
          return;
        }

        grid.innerHTML = grade.topics.map(topic => {
          const setWord = topic.sets.length === 1 ? 'set' : 'sets';
          return `
            <a class="topic-card fade-in"
               href="topic.html?grade=${gradeSlug}&slug=${topic.slug}"
               style="--topic-color: ${topic.color}">
              <div class="topic-card__stripe"></div>
              <div class="topic-card__body">
                <h2 class="topic-card__title">${topic.title}</h2>
                <p class="topic-card__desc">${topic.description}</p>
                <div class="topic-card__footer">
                  <span class="topic-card__count">${topic.sets.length} ${setWord}</span>
                  <span class="topic-card__arrow">→</span>
                </div>
              </div>
            </a>
          `;
        }).join('');

      } catch (err) {
        grid.innerHTML = `<p class="empty">Failed to load.<br><small>${err.message}</small></p>`;
      }
    }

    init();
  </script>
</body>
</html>
