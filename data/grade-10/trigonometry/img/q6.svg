<svg viewBox="0 0 320 210" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Quadrilateral ABCD: A(30,134) B(102,40) C(290,104) D(235,167) -->
  <!-- Diagonal BD from B(102,40) to D(235,167) -->

  <!-- Quadrilateral outline -->
  <line x1="30"  y1="134" x2="102" y2="40"  stroke="#334155" stroke-width="1.5"/>
  <line x1="102" y1="40"  x2="290" y2="104" stroke="#334155" stroke-width="1.5"/>
  <line x1="290" y1="104" x2="235" y2="167" stroke="#334155" stroke-width="1.5"/>
  <line x1="235" y1="167" x2="30"  y2="134" stroke="#334155" stroke-width="1.5"/>

  <!-- Diagonal BD (dashed) -->
  <line x1="102" y1="40" x2="235" y2="167" stroke="#475569" stroke-width="1.2" stroke-dasharray="5 3"/>

  <!-- BD label (given, teal) -->
  <text x="158" y="98" font-size="11" fill="#0d9488" transform="rotate(45 158 98)">16 cm</text>

  <!-- Vertex labels -->
  <text x="13"  y="140" font-size="13" font-weight="700" fill="#1e293b">A</text>
  <text x="95"  y="30"  font-size="13" font-weight="700" fill="#1e293b">B</text>
  <text x="293" y="110" font-size="13" font-weight="700" fill="#1e293b">C</text>
  <text x="238" y="180" font-size="13" font-weight="700" fill="#1e293b">D</text>

  <!-- Triangle ABD labels -->
  <text x="52"  y="78"  font-size="10" fill="#0d9488">AB=11</text>
  <text x="110" y="58"  font-size="10" fill="#475569">48°</text>
  <text x="205" y="162" font-size="10" fill="#475569">62°</text>

  <!-- Triangle BCD labels -->
  <text x="190" y="65"  font-size="10" fill="#0d9488">BC=20</text>
  <text x="120" y="68"  font-size="10" fill="#475569">35°</text>

  <!-- Unknowns -->
  <text x="38"  y="122" font-size="10" fill="#7c3aed" font-style="italic">AD=?</text>
  <text x="260" y="138" font-size="10" fill="#7c3aed" font-style="italic">CD=?</text>
</svg>
