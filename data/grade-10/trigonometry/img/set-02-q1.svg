<svg viewBox="0 0 320 205" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Right triangle ABC: A(56,160) B(160,160) C(160,100) -->
  <!-- ∠A=30°, ∠B=90°, ∠C=60°, BC=5, AB=5√3, AC=10 -->
  <line x1="56"  y1="160" x2="160" y2="160" stroke="#334155" stroke-width="1.5"/>
  <line x1="160" y1="160" x2="160" y2="100" stroke="#334155" stroke-width="1.5"/>
  <line x1="56"  y1="160" x2="160" y2="100" stroke="#334155" stroke-width="1.5"/>
  <!-- Right-angle mark at B -->
  <path d="M 152 160 L 152 152 L 160 152" fill="none" stroke="#334155" stroke-width="1"/>
  <!-- Vertex labels -->
  <text x="40"  y="166" font-size="13" font-weight="700" fill="#1e293b">A</text>
  <text x="163" y="166" font-size="13" font-weight="700" fill="#1e293b">B</text>
  <text x="163" y="98"  font-size="13" font-weight="700" fill="#1e293b">C</text>
  <!-- Angle labels -->
  <text x="68"  y="154" font-size="11" fill="#475569">30°</text>
  <text x="163" y="120" font-size="11" fill="#475569">60°</text>
  <!-- Given: BC=5 (teal) -->
  <text x="164" y="134" font-size="11" fill="#0d9488">5 cm</text>
  <!-- Unknowns (violet) -->
  <text x="96"  y="174" text-anchor="middle" font-size="11" fill="#7c3aed" font-style="italic">5√3 cm ?</text>
  <text x="98"  y="122" font-size="11" fill="#7c3aed" font-style="italic" transform="rotate(-30 98 122)">10 cm ?</text>
</svg>
