<svg viewBox="0 0 320 205" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Triangle PQR: P(50,175) Q(198,38) R(260,175) -->
  <line x1="50" y1="175" x2="260" y2="175" stroke="#334155" stroke-width="1.5"/>
  <line x1="50" y1="175" x2="198" y2="38"  stroke="#334155" stroke-width="1.5"/>
  <line x1="198" y1="38" x2="260" y2="175" stroke="#334155" stroke-width="1.5"/>
  <!-- Vertex labels -->
  <text x="33"  y="181" font-size="13" font-weight="700" fill="#1e293b">P</text>
  <text x="191" y="29"  font-size="13" font-weight="700" fill="#1e293b">Q</text>
  <text x="263" y="181" font-size="13" font-weight="700" fill="#1e293b">R</text>
  <!-- Angle labels (inside) -->
  <text x="67"  y="167" font-size="11" fill="#475569">42°</text>
  <text x="183" y="57"  font-size="11" fill="#475569">73°</text>
  <text x="232" y="167" font-size="11" fill="#475569">65°</text>
  <!-- PR = 15 cm (given, teal) -->
  <text x="155" y="194" text-anchor="middle" font-size="11" fill="#0d9488">15 cm</text>
  <!-- QR unknown (violet) -->
  <text x="242" y="101" font-size="12" fill="#7c3aed" font-style="italic">?</text>
</svg>
