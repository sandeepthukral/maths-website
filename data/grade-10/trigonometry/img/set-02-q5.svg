<svg viewBox="0 0 320 205" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Right isosceles triangle PQR: P(60,165) Q(165,165) R(165,60) -->
  <!-- ∠Q=90°, ∠P=∠R=45°, PR=10√2, PQ=QR=10 -->
  <line x1="60"  y1="165" x2="165" y2="165" stroke="#334155" stroke-width="1.5"/>
  <line x1="165" y1="165" x2="165" y2="60"  stroke="#334155" stroke-width="1.5"/>
  <line x1="60"  y1="165" x2="165" y2="60"  stroke="#334155" stroke-width="1.5"/>
  <!-- Right-angle mark at Q -->
  <path d="M 157 165 L 157 157 L 165 157" fill="none" stroke="#334155" stroke-width="1"/>
  <!-- Vertex labels -->
  <text x="43"  y="171" font-size="13" font-weight="700" fill="#1e293b">P</text>
  <text x="168" y="171" font-size="13" font-weight="700" fill="#1e293b">Q</text>
  <text x="168" y="58"  font-size="13" font-weight="700" fill="#1e293b">R</text>
  <!-- Angle labels -->
  <text x="76"  y="157" font-size="11" fill="#475569">45°</text>
  <text x="155" y="80"  font-size="11" fill="#475569">45°</text>
  <!-- Given hypotenuse PR (teal) -->
  <text x="95"  y="104" font-size="11" fill="#0d9488" transform="rotate(-45 95 104)">10√2 cm</text>
  <!-- Unknown legs (violet) -->
  <text x="108" y="181" text-anchor="middle" font-size="11" fill="#7c3aed" font-style="italic">? cm</text>
  <text x="178" y="116" font-size="11" fill="#7c3aed" font-style="italic">? cm</text>
</svg>
