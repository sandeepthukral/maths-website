<svg viewBox="0 0 320 205" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Right triangle ABC: A(165,165) B(40,165) C(40,90) -->
  <!-- ∠B=90°, ∠A=30°, AB=12, BC=4√3, AC=8√3 -->
  <!-- M midpoint of AC: M(102,128) -->
  <line x1="165" y1="165" x2="40"  y2="165" stroke="#334155" stroke-width="1.5"/>
  <line x1="40"  y1="165" x2="40"  y2="90"  stroke="#334155" stroke-width="1.5"/>
  <line x1="165" y1="165" x2="40"  y2="90"  stroke="#334155" stroke-width="1.5"/>
  <!-- Right-angle mark at B -->
  <path d="M 48 165 L 48 157 L 40 157" fill="none" stroke="#334155" stroke-width="1"/>
  <!-- Midpoint M on AC -->
  <circle cx="102" cy="128" r="2.5" fill="#475569"/>
  <!-- BM dashed -->
  <line x1="40"  y1="165" x2="102" y2="128" stroke="#475569" stroke-width="1.2" stroke-dasharray="5 3"/>
  <!-- Tick marks on AM and MC -->
  <line x1="126" y1="144" x2="134" y2="136" stroke="#475569" stroke-width="1.2"/>
  <line x1="72"  y1="112" x2="80"  y2="104" stroke="#475569" stroke-width="1.2"/>
  <!-- Vertex labels -->
  <text x="168" y="171" font-size="13" font-weight="700" fill="#1e293b">A</text>
  <text x="23"  y="171" font-size="13" font-weight="700" fill="#1e293b">B</text>
  <text x="23"  y="88"  font-size="13" font-weight="700" fill="#1e293b">C</text>
  <text x="105" y="124" font-size="12" font-weight="700" fill="#1e293b">M</text>
  <!-- Given AB=12 (teal) -->
  <text x="98"  y="179" text-anchor="middle" font-size="11" fill="#0d9488">12 cm</text>
  <!-- Angle at A = 30° -->
  <text x="143" y="158" font-size="11" fill="#475569">30°</text>
  <!-- Unknowns (violet) -->
  <text x="24"  y="131" font-size="10" fill="#7c3aed" font-style="italic">BC=?</text>
  <text x="190" y="125" font-size="10" fill="#7c3aed" font-style="italic">BM=?</text>
</svg>
