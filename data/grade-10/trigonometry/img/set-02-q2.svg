<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Triangle PQR: P(40,160) Q(70,108) R(200,160) -->
  <!-- ∠P=60°, PQ=3, PR=8, QR=7 -->
  <line x1="40"  y1="160" x2="70"  y2="108" stroke="#334155" stroke-width="1.5"/>
  <line x1="70"  y1="108" x2="200" y2="160" stroke="#334155" stroke-width="1.5"/>
  <line x1="40"  y1="160" x2="200" y2="160" stroke="#334155" stroke-width="1.5"/>
  <!-- Vertex labels -->
  <text x="24"  y="166" font-size="13" font-weight="700" fill="#1e293b">P</text>
  <text x="63"  y="100" font-size="13" font-weight="700" fill="#1e293b">Q</text>
  <text x="203" y="166" font-size="13" font-weight="700" fill="#1e293b">R</text>
  <!-- Angle arc at P -->
  <path d="M 62 160 A 22 22 0 0 0 55 140" fill="none" stroke="#475569" stroke-width="1"/>
  <text x="62"  y="150" font-size="11" fill="#475569">60°</text>
  <!-- Given sides (teal) -->
  <text x="46"  y="130" font-size="11" fill="#0d9488" transform="rotate(-63 46 130)">3 cm</text>
  <text x="116" y="174" text-anchor="middle" font-size="11" fill="#0d9488">8 cm</text>
  <!-- Unknown QR (violet) -->
  <text x="148" y="128" font-size="11" fill="#7c3aed" font-style="italic" transform="rotate(25 148 128)">? cm</text>
</svg>
