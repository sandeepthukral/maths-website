<svg viewBox="0 0 320 205" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Triangle ABC: A(28,185) B(160,35) C(294,185) -->
  <!-- D on AC at ratio AD:DC = 25:18, so D_x = 28 + (25/43)*(294-28) = 183, D_y = 185 -->
  <line x1="28"  y1="185" x2="160" y2="35"  stroke="#334155" stroke-width="1.5"/>
  <line x1="160" y1="35"  x2="294" y2="185" stroke="#334155" stroke-width="1.5"/>
  <line x1="28"  y1="185" x2="294" y2="185" stroke="#334155" stroke-width="1.5"/>

  <!-- Angle bisector BD (dashed) -->
  <line x1="160" y1="35" x2="183" y2="185" stroke="#475569" stroke-width="1.2" stroke-dasharray="5 3"/>
  <circle cx="183" cy="185" r="2.5" fill="#475569"/>

  <!-- Tick marks on angle bisector halves at B -->
  <!-- Small tick on angle ABD -->
  <line x1="148" y1="65" x2="142" y2="72" stroke="#475569" stroke-width="1.2"/>
  <!-- Small tick on angle DBC -->
  <line x1="168" y1="65" x2="174" y2="72" stroke="#475569" stroke-width="1.2"/>

  <!-- Vertex labels -->
  <text x="13"  y="191" font-size="13" font-weight="700" fill="#1e293b">A</text>
  <text x="153" y="25"  font-size="13" font-weight="700" fill="#1e293b">B</text>
  <text x="297" y="191" font-size="13" font-weight="700" fill="#1e293b">C</text>
  <text x="181" y="200" font-size="12" font-weight="700" fill="#1e293b">D</text>

  <!-- Side labels (teal = given) -->
  <text x="80"  y="101" font-size="11" fill="#0d9488" transform="rotate(-35 80 101)">250 m</text>
  <text x="240" y="101" font-size="11" fill="#0d9488" transform="rotate(37 240 101)">180 m</text>

  <!-- Angle ABC label -->
  <text x="148" y="68" font-size="10" fill="#475569">76°</text>
  <path d="M 147 52 A 18 18 0 0 1 173 52" fill="none" stroke="#475569" stroke-width="1"/>

  <!-- Unknowns -->
  <text x="260" y="160" font-size="10" fill="#7c3aed" font-style="italic">BD = ?</text>
</svg>
