<svg viewBox="0 0 270 215" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!--
    Isosceles triangle PQR: PQ=PR=6, ∠QPR=120°.
    QR=6√3≈10.39. Height from P to QR = 3.
    Place QR horizontal: Q(45,165), R(225,165), midpoint M(135,165).
    Height from P to QR = 3; with scale 15px/m → 45px.
    P is ABOVE QR? No — with ∠QPR=120° (obtuse), P is on opposite side.
    Actually P is above QR if QR=6√3≈10.39m and height=3m.
    Midpoint M of QR at (135,165).
    P = (135, 165-45) = (135, 120).
    QR = 6√3 × 15 ≈ 155.9px. Half = 77.95px.
    Q=(135-78,165)=(57,165), R=(135+78,165)=(213,165).
    PQ = distance from (135,120) to (57,165) = √(78²+45²) = √(6084+2025)=√8109≈90px.
    At 15px/m: 90/15=6 ✓
  -->

  <!-- Triangle sides -->
  <line x1="135" y1="120" x2="57"  y2="165" stroke="#334155" stroke-width="1.8"/>
  <line x1="135" y1="120" x2="213" y2="165" stroke="#334155" stroke-width="1.8"/>
  <line x1="57"  y1="165" x2="213" y2="165" stroke="#334155" stroke-width="1.8"/>

  <!-- Perpendicular from P to QR (dashed) -->
  <line x1="135" y1="120" x2="135" y2="165" stroke="#475569" stroke-width="1.2" stroke-dasharray="5 3"/>
  <!-- Right-angle mark at M -->
  <path d="M 127 165 L 127 157 L 135 157" fill="none" stroke="#475569" stroke-width="1"/>
  <circle cx="135" cy="165" r="2" fill="#475569"/>

  <!-- Vertex labels -->
  <text x="129" y="112" font-size="13" font-weight="700" fill="#1e293b">P</text>
  <text x="41"  y="177" font-size="13" font-weight="700" fill="#1e293b">Q</text>
  <text x="215" y="177" font-size="13" font-weight="700" fill="#1e293b">R</text>
  <text x="138" y="180" font-size="12" font-weight="700" fill="#475569">M</text>

  <!-- Tick marks on PQ and PR (equal sides) -->
  <line x1="91"  y1="140" x2="98"  y2="133" stroke="#334155" stroke-width="1.5"/>
  <line x1="172" y1="140" x2="179" y2="133" stroke="#334155" stroke-width="1.5"/>

  <!-- Side labels (teal — given) -->
  <text x="82"  y="137" text-anchor="middle" font-size="11" fill="#0d9488" transform="rotate(-29 82 137)">6 cm</text>
  <text x="182" y="137" text-anchor="middle" font-size="11" fill="#0d9488" transform="rotate(29 182 137)">6 cm</text>

  <!-- Angle at P (120°) -->
  <path d="M 121 125 A 15 15 0 1 0 149 125" fill="none" stroke="#475569" stroke-width="1"/>
  <text x="126" y="146" font-size="11" fill="#475569">120°</text>

  <!-- Unknown labels (violet) -->
  <text x="135" y="183" text-anchor="middle" font-size="11" fill="#7c3aed" font-style="italic">QR = ?</text>
  <text x="147" y="145" font-size="10" fill="#7c3aed" font-style="italic">h = ?</text>
</svg>
