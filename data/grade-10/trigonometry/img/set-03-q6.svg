<svg viewBox="0 0 300 210" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!--
    Campsite PQRS with diagonal PR.
    Schematic (not to exact scale).
    P(55,170)  Q(175,175)  R(255,70)  S(90,30)
  -->

  <!-- Quadrilateral sides -->
  <line x1="55"  y1="170" x2="175" y2="175" stroke="#334155" stroke-width="1.8"/>
  <line x1="175" y1="175" x2="255" y2="70"  stroke="#334155" stroke-width="1.8"/>
  <line x1="255" y1="70"  x2="90"  y2="30"  stroke="#334155" stroke-width="1.8"/>
  <line x1="90"  y1="30"  x2="55"  y2="170" stroke="#334155" stroke-width="1.8"/>

  <!-- Diagonal PR (dashed) -->
  <line x1="55" y1="170" x2="255" y2="70" stroke="#475569" stroke-width="1.3" stroke-dasharray="6 3"/>

  <!-- Vertex labels -->
  <text x="40"  y="178" font-size="13" font-weight="700" fill="#1e293b">P</text>
  <text x="178" y="188" font-size="13" font-weight="700" fill="#1e293b">Q</text>
  <text x="258" y="70"  font-size="13" font-weight="700" fill="#1e293b">R</text>
  <text x="86"  y="22"  font-size="13" font-weight="700" fill="#1e293b">S</text>

  <!-- Side labels (teal = given) -->
  <text x="115" y="185" text-anchor="middle" font-size="11" fill="#0d9488">6 m</text>
  <text x="225" y="138" text-anchor="middle" font-size="11" fill="#0d9488">8 m</text>
  <text x="58"  y="95"  text-anchor="end"    font-size="11" fill="#0d9488">10 m</text>
  <text x="172" y="45"  text-anchor="middle" font-size="11" fill="#0d9488">6 m</text>

  <!-- Angle labels -->
  <text x="178" y="165" font-size="11" fill="#475569">30°</text>
  <text x="78"  y="60"  font-size="11" fill="#475569">60°</text>

  <!-- Area label -->
  <text x="145" y="130" text-anchor="middle" font-size="11" fill="#7c3aed" font-style="italic">Area = ?</text>
</svg>
