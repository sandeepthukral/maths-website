<svg viewBox="0 0 280 215" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!--
    JFK = (130, 100). Scale = 16px/km.
    Plane A: bearing 050°, 3 km → (167, 69)
    Plane B: bearing 170°, 5 km → (144, 179)
    AB = 7 km (cosine rule with 120° angle)
  -->

  <!-- North arrow from JFK -->
  <line x1="130" y1="100" x2="130" y2="18" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>
  <polygon points="127,18 133,18 130,10" fill="#94a3b8"/>
  <text x="134" y="16" font-size="11" fill="#475569">N</text>

  <!-- JFK label -->
  <circle cx="130" cy="100" r="4" fill="#334155"/>
  <text x="136" y="102" font-size="12" font-weight="700" fill="#334155">JFK</text>

  <!-- Bearing 050° reference line (faint) -->
  <line x1="130" y1="100" x2="188" y2="54" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="3 2"/>

  <!-- Plane A line: bearing 050°, 3km, end=(167,69) -->
  <line x1="130" y1="100" x2="167" y2="69" stroke="#0d9488" stroke-width="2.2"/>
  <circle cx="167" cy="69" r="4" fill="#0d9488"/>
  <text x="171" y="66" font-size="12" font-weight="700" fill="#0d9488">A</text>
  <text x="141" y="80" font-size="10" fill="#0d9488">3 km</text>

  <!-- Bearing 050° angle arc at JFK -->
  <path d="M 130 70 A 30 30 0 0 1 149 74" fill="none" stroke="#0d9488" stroke-width="1"/>
  <text x="143" y="66" font-size="10" fill="#0d9488">50°</text>

  <!-- Plane B line: bearing 170°, 5km, end=(144,179) -->
  <line x1="130" y1="100" x2="144" y2="179" stroke="#7c3aed" stroke-width="2.2"/>
  <circle cx="144" cy="179" r="4" fill="#7c3aed"/>
  <text x="148" y="182" font-size="12" font-weight="700" fill="#7c3aed">B</text>
  <text x="120" y="148" font-size="10" fill="#7c3aed">5 km</text>

  <!-- Bearing 170° angle arc at JFK -->
  <path d="M 130 72 A 28 28 0 1 1 142 97" fill="none" stroke="#7c3aed" stroke-width="1"/>
  <text x="92" y="98" font-size="10" fill="#7c3aed">170°</text>

  <!-- AB line (unknown) -->
  <line x1="167" y1="69" x2="144" y2="179" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="164" y="130" font-size="11" fill="#475569" font-style="italic">? km</text>

  <!-- Angle at JFK between the two bearings -->
  <text x="153" y="114" font-size="10" fill="#64748b">120°</text>
</svg>
