<svg viewBox="0 0 330 185" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Ground line -->
  <line x1="15" y1="155" x2="315" y2="155" stroke="#334155" stroke-width="1.8"/>

  <!-- Tower (vertical) -->
  <line x1="280" y1="155" x2="280" y2="50" stroke="#334155" stroke-width="2"/>
  <!-- Tower cap -->
  <polygon points="275,50 285,50 280,42" fill="#334155"/>

  <!-- Right-angle mark at tower base -->
  <path d="M 272 155 L 272 147 L 280 147" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Person 1 (far, 30° angle) at x=55 -->
  <!-- Stick figure -->
  <circle cx="55" cy="149" r="4" fill="#475569"/>
  <line x1="55" y1="153" x2="55" y2="143" stroke="#475569" stroke-width="1.5"/>
  <!-- Line of sight to tower top -->
  <line x1="55" y1="149" x2="280" y2="50" stroke="#0d9488" stroke-width="1.3" stroke-dasharray="6 3"/>
  <!-- 30° arc -->
  <path d="M 80 149 A 25 25 0 0 1 69 131" fill="none" stroke="#475569" stroke-width="1"/>
  <text x="88" y="146" font-size="11" fill="#475569">30°</text>

  <!-- Person 2 (close, 60° angle) at x=165 -->
  <circle cx="165" cy="149" r="4" fill="#475569"/>
  <line x1="165" y1="153" x2="165" y2="143" stroke="#475569" stroke-width="1.5"/>
  <!-- Line of sight to tower top -->
  <line x1="165" y1="149" x2="280" y2="50" stroke="#7c3aed" stroke-width="1.3" stroke-dasharray="6 3"/>
  <!-- 60° arc -->
  <path d="M 185 149 A 20 20 0 0 1 178 131" fill="none" stroke="#475569" stroke-width="1"/>
  <text x="188" y="146" font-size="11" fill="#475569">60°</text>

  <!-- Distance labels -->
  <!-- 15m: from person1 (x=55) to tower base (x=280) -->
  <line x1="55" y1="165" x2="280" y2="165" stroke="#334155" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="168" y="178" text-anchor="middle" font-size="11" fill="#0d9488">15 m</text>
  <!-- 10m: between persons -->
  <line x1="55" y1="162" x2="55" y2="168" stroke="#334155" stroke-width="1"/>
  <line x1="165" y1="162" x2="165" y2="168" stroke="#334155" stroke-width="1"/>
  <text x="110" y="162" text-anchor="middle" font-size="10" fill="#64748b">10 m</text>
  <!-- 5m: person2 to tower -->
  <text x="223" y="162" text-anchor="middle" font-size="10" fill="#64748b">5 m</text>

  <!-- Height label -->
  <text x="292" y="103" font-size="11" fill="#7c3aed" font-style="italic">h = ?</text>
</svg>
