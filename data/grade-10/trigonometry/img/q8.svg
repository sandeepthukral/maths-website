<svg viewBox="0 0 320 210" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Outer triangle ACE: A(28,188) C(158,18) E(296,188) -->
  <line x1="28"  y1="188" x2="158" y2="18"  stroke="#334155" stroke-width="1.5"/>
  <line x1="158" y1="18"  x2="296" y2="188" stroke="#334155" stroke-width="1.5"/>
  <line x1="28"  y1="188" x2="296" y2="188" stroke="#334155" stroke-width="1.5"/>

  <!-- B on AC at ~35% from A: (28+0.35*(158-28), 188+0.35*(18-188)) = (74,129) -->
  <!-- D on CE at ~28% from C: (158+0.28*(296-158), 18+0.28*(188-18)) = (197,66) -->
  <circle cx="74"  cy="129" r="2.5" fill="#334155"/>
  <circle cx="197" cy="66"  r="2.5" fill="#334155"/>

  <!-- BD line -->
  <line x1="74" y1="129" x2="197" y2="66" stroke="#334155" stroke-width="1.2"/>

  <!-- Right-angle mark at B: BC direction (84,-111), BD direction drawn toward D -->
  <!-- Small square: move 9px along BC then 9px toward BD -->
  <!-- BC unit ≈ (0.603,-0.798); perp CW ≈ (0.798,0.603) -->
  <path d="M 79 121 L 87 126 L 81 135 L 74 129 Z" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Vertex labels -->
  <text x="14"  y="194" font-size="13" font-weight="700" fill="#1e293b">A</text>
  <text x="151" y="10"  font-size="13" font-weight="700" fill="#1e293b">C</text>
  <text x="299" y="194" font-size="13" font-weight="700" fill="#1e293b">E</text>
  <text x="59"  y="129" font-size="12" font-weight="700" fill="#1e293b">B</text>
  <text x="200" y="62"  font-size="12" font-weight="700" fill="#1e293b">D</text>

  <!-- Measurements (teal = given) -->
  <text x="162" y="198" text-anchor="middle" font-size="11" fill="#0d9488">AE = 9 cm</text>
  <text x="37"  y="165" font-size="10" fill="#0d9488">AB=7</text>

  <!-- Angles -->
  <text x="85"  y="122" font-size="10" fill="#475569">90°</text>
  <text x="163" y="54"  font-size="10" fill="#475569">25°</text>
  <text x="187" y="85"  font-size="10" fill="#475569">70°</text>

  <!-- Unknowns -->
  <text x="260" y="135" font-size="10" fill="#7c3aed" font-style="italic">∠AEC=?</text>
</svg>
