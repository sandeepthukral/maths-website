<svg viewBox="0 0 320 215" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- P at (150,112), North arrow to (150,28) -->
  <!-- Ship A: bearing 040°, 55px → (185,70) -->
  <!-- Ship B: bearing 155°, 71px → (180,176) -->

  <!-- North arrow -->
  <line x1="150" y1="112" x2="150" y2="32" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>
  <polygon points="150,28 146,38 154,38" fill="#94a3b8"/>
  <text x="154" y="27" font-size="11" fill="#64748b">N</text>

  <!-- Bearing arc 040° -->
  <path d="M 150 92 A 20 20 0 0 1 163 99" fill="none" stroke="#475569" stroke-width="1"/>
  <text x="155" y="89" font-size="10" fill="#475569">040°</text>

  <!-- Line P→A (bearing 040°, 24 km) -->
  <line x1="150" y1="112" x2="185" y2="70" stroke="#334155" stroke-width="1.5"/>
  <circle cx="185" cy="70" r="3" fill="#334155"/>
  <text x="192" y="67" font-size="13" font-weight="700" fill="#1e293b">A</text>
  <text x="171" y="83" font-size="10" fill="#0d9488">24 km</text>

  <!-- Line P→B (bearing 155°, 31 km) -->
  <line x1="150" y1="112" x2="180" y2="176" stroke="#334155" stroke-width="1.5"/>
  <circle cx="180" cy="176" r="3" fill="#334155"/>
  <text x="183" y="180" font-size="13" font-weight="700" fill="#1e293b">B</text>
  <text x="152" y="155" font-size="10" fill="#0d9488">31 km</text>
  <text x="115" y="155" font-size="10" fill="#475569">155°</text>

  <!-- P label -->
  <circle cx="150" cy="112" r="3" fill="#334155"/>
  <text x="138" y="112" font-size="13" font-weight="700" fill="#1e293b">P</text>

  <!-- Dashed line A→B (unknown distance) -->
  <line x1="185" y1="70" x2="180" y2="176" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="196" y="130" font-size="12" fill="#7c3aed" font-style="italic">?</text>
</svg>
