<svg viewBox="0 0 310 185" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!--
    Flagpole base at (260, 155). Height h = 5√3 ≈ 86.6 px (at 10px/m, height=5√3m).
    Scale: 10px/m.
    Anna at x=60 (distance 200px = 20m → scale 10px/m ✓, but question says 15m)
    Let's use 12px/m: Anna at x=260-180=80 (15m=180px), Bob at x=260-60=200 (5m=60px)
    10m between them: 200-80=120px = 10m ✓
    Height: 5√3 m ≈ 8.66m → 8.66×12 ≈ 104px. Top at (260, 155-104)=(260,51)
  -->

  <!-- Ground line -->
  <line x1="20" y1="155" x2="300" y2="155" stroke="#334155" stroke-width="1.8"/>

  <!-- Flagpole -->
  <line x1="260" y1="155" x2="260" y2="51" stroke="#334155" stroke-width="2.5"/>
  <polygon points="253,51 267,51 260,42" fill="#334155"/>

  <!-- Right-angle mark at base -->
  <path d="M 252 155 L 252 147 L 260 147" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Anna (left person) at x=80 -->
  <circle cx="80" cy="149" r="5" fill="#475569"/>
  <line x1="80" y1="154" x2="80" y2="140" stroke="#475569" stroke-width="1.5"/>
  <text x="73" y="174" font-size="11" font-weight="600" fill="#475569">Anna</text>
  <!-- Line of sight -->
  <line x1="80" y1="149" x2="260" y2="51" stroke="#0d9488" stroke-width="1.4" stroke-dasharray="6 3"/>
  <!-- 30° arc -->
  <path d="M 104 149 A 24 24 0 0 1 96 132" fill="none" stroke="#0d9488" stroke-width="1"/>
  <text x="108" y="146" font-size="11" fill="#0d9488">30°</text>

  <!-- Bob (closer) at x=200 -->
  <circle cx="200" cy="149" r="5" fill="#475569"/>
  <line x1="200" y1="154" x2="200" y2="140" stroke="#475569" stroke-width="1.5"/>
  <text x="194" y="174" font-size="11" font-weight="600" fill="#475569">Bob</text>
  <!-- Line of sight -->
  <line x1="200" y1="149" x2="260" y2="51" stroke="#7c3aed" stroke-width="1.4" stroke-dasharray="6 3"/>
  <!-- 60° arc -->
  <path d="M 218 149 A 18 18 0 0 1 214 132" fill="none" stroke="#7c3aed" stroke-width="1"/>
  <text x="220" y="145" font-size="11" fill="#7c3aed">60°</text>

  <!-- Distance labels -->
  <line x1="80"  y1="163" x2="200" y2="163" stroke="#64748b" stroke-width="1"/>
  <line x1="80"  y1="160" x2="80"  y2="166" stroke="#64748b" stroke-width="1"/>
  <line x1="200" y1="160" x2="200" y2="166" stroke="#64748b" stroke-width="1"/>
  <text x="140" y="175" text-anchor="middle" font-size="11" fill="#64748b">10 m</text>

  <!-- Height label -->
  <text x="272" y="103" font-size="11" fill="#475569" font-style="italic">h = ?</text>
</svg>
