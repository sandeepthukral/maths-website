<svg viewBox="0 0 240 185" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!--
    Coordinates (scaled ×35, shifted):
    B = (0,0)→(60,150)
    A = (√3,0)→(60+60,150)=(120,150)
    C = (0,3)→(60,150-105)=(60,45)
    D = (3√3/2,3/2)→(60+91,150-52)=(151,98)
  -->

  <!-- Triangle ABC (right angle at B) -->
  <line x1="120" y1="150" x2="60"  y2="150" stroke="#334155" stroke-width="1.8"/>
  <line x1="60"  y1="150" x2="60"  y2="45"  stroke="#334155" stroke-width="1.8"/>
  <line x1="120" y1="150" x2="60"  y2="45"  stroke="#334155" stroke-width="1.8" stroke-dasharray="5 3"/>

  <!-- Triangle ACD (right angle at D) -->
  <line x1="60"  y1="45"  x2="151" y2="98"  stroke="#334155" stroke-width="1.8"/>
  <line x1="151" y1="98"  x2="120" y2="150" stroke="#334155" stroke-width="1.8"/>

  <!-- Right-angle mark at B -->
  <path d="M 68 150 L 68 142 L 60 142" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Right-angle mark at D -->
  <!-- DA direction: A(120,150)-D(151,98) = (-31,52), normalised -->
  <!-- DC direction: C(60,45)-D(151,98) = (-91,-53) -->
  <!-- Small square at D approximated -->
  <path d="M 144 108 L 138 99 L 148 93" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Vertex labels -->
  <text x="123" y="162" font-size="13" font-weight="700" fill="#1e293b">A</text>
  <text x="48"  y="162" font-size="13" font-weight="700" fill="#1e293b">B</text>
  <text x="47"  y="42"  font-size="13" font-weight="700" fill="#1e293b">C</text>
  <text x="155" y="102" font-size="13" font-weight="700" fill="#1e293b">D</text>

  <!-- Angle marks -->
  <path d="M 105 150 A 15 15 0 0 0 96 141" fill="none" stroke="#475569" stroke-width="1"/>
  <text x="92" y="145" font-size="10" fill="#475569">60°</text>

  <!-- ∠CAD=60° arc at A (between AC diagonal and AD) -->
  <text x="121" y="138" font-size="10" fill="#475569">60°</text>

  <!-- Side labels (teal = given, violet = unknown) -->
  <text x="87"  y="163" text-anchor="middle" font-size="11" fill="#0d9488">√3 cm</text>
  <text x="48"  y="100" text-anchor="end"   font-size="11" fill="#0d9488">3 cm</text>
  <!-- AC diagonal -->
  <text x="82"  y="95"  text-anchor="middle" font-size="10" fill="#475569" font-style="italic">AC=2√3</text>
  <!-- CD -->
  <text x="120" y="112" text-anchor="middle" font-size="11" fill="#7c3aed">3 cm</text>
  <!-- AD -->
  <text x="147" y="138" text-anchor="middle" font-size="11" fill="#7c3aed">√3 cm</text>
</svg>
