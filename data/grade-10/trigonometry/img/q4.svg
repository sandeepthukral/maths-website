<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Triangle ABC: A(40,160) B(200,58) C(280,160) -->
  <line x1="40"  y1="160" x2="200" y2="58"  stroke="#334155" stroke-width="1.5"/>
  <line x1="200" y1="58"  x2="280" y2="160" stroke="#334155" stroke-width="1.5"/>
  <line x1="40"  y1="160" x2="280" y2="160" stroke="#334155" stroke-width="1.5"/>
  <!-- Vertex labels -->
  <text x="23"  y="166" font-size="13" font-weight="700" fill="#1e293b">A</text>
  <text x="194" y="48"  font-size="13" font-weight="700" fill="#1e293b">B</text>
  <text x="282" y="166" font-size="13" font-weight="700" fill="#1e293b">C</text>
  <!-- Angle arc at A (35°) -->
  <path d="M 62 160 A 22 22 0 0 0 56 140" fill="none" stroke="#475569" stroke-width="1"/>
  <text x="65" y="150" font-size="11" fill="#475569">35°</text>
  <!-- AB = 18 (given, teal) -->
  <text x="108" y="101" font-size="11" fill="#0d9488" transform="rotate(-30 108 101)">18 cm</text>
  <!-- BC = 12 (given, teal) -->
  <text x="248" y="101" font-size="11" fill="#0d9488" transform="rotate(35 248 101)">12 cm</text>
  <!-- AC unknown -->
  <text x="160" y="178" text-anchor="middle" font-size="11" fill="#7c3aed" font-style="italic">AC = ?</text>
</svg>
