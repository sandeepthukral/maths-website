<svg viewBox="0 0 300 185" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Universe rectangle -->
  <rect x="10" y="10" width="280" height="165" rx="6" fill="none" stroke="#334155" stroke-width="1.5"/>
  <!-- Circle A -->
  <circle cx="110" cy="92" r="62" fill="#e0f2fe" fill-opacity="0.7" stroke="#0369a1" stroke-width="1.8"/>
  <!-- Circle S -->
  <circle cx="190" cy="92" r="62" fill="#fce7f3" fill-opacity="0.7" stroke="#7c3aed" stroke-width="1.8"/>
  <!-- Labels A, S -->
  <text x="60" y="38" font-size="15" font-weight="700" fill="#0369a1">A</text>
  <text x="230" y="38" font-size="15" font-weight="700" fill="#7c3aed">S</text>
  <!-- Values -->
  <text x="78" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#0369a1">96</text>
  <text x="150" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">2</text>
  <text x="222" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#7c3aed">52</text>
  <!-- Outside label -->
  <text x="260" y="162" text-anchor="middle" font-size="14" fill="#475569">10</text>
  <!-- Total label -->
  <text x="150" y="173" text-anchor="middle" font-size="11" fill="#64748b">Total = 160 students</text>
</svg>
