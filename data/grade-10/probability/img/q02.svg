<svg viewBox="0 0 300 185" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Universe rectangle -->
  <rect x="10" y="10" width="280" height="165" rx="6" fill="none" stroke="#334155" stroke-width="1.5"/>
  <!-- Circle P (Physics) -->
  <circle cx="110" cy="92" r="62" fill="#dcfce7" fill-opacity="0.7" stroke="#16a34a" stroke-width="1.8"/>
  <!-- Circle C (Chemistry) -->
  <circle cx="190" cy="92" r="62" fill="#fef9c3" fill-opacity="0.7" stroke="#b45309" stroke-width="1.8"/>
  <!-- Labels P, C -->
  <text x="55" y="38" font-size="15" font-weight="700" fill="#16a34a">P</text>
  <text x="228" y="38" font-size="15" font-weight="700" fill="#b45309">C</text>
  <!-- Values -->
  <text x="75" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#16a34a">4</text>
  <text x="150" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">15</text>
  <text x="225" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">2</text>
  <!-- Outside label -->
  <text x="260" y="162" text-anchor="middle" font-size="14" fill="#475569">9</text>
  <!-- Total label -->
  <text x="150" y="173" text-anchor="middle" font-size="11" fill="#64748b">Total = 30 students</text>
</svg>
