<svg viewBox="0 0 310 215" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Universe rectangle -->
  <rect x="5" y="5" width="300" height="205" rx="6" fill="none" stroke="#334155" stroke-width="1.8"/>
  <text x="14" y="22" font-size="12" font-weight="700" fill="#334155">U</text>

  <!-- Circle F (Football, top-left) -->
  <circle cx="115" cy="95" r="72" fill="#e0f2fe" fill-opacity="0.45" stroke="#0d9488" stroke-width="1.8"/>
  <text x="52" y="36" font-size="12" font-weight="700" fill="#0d9488">F</text>

  <!-- Circle B (Basketball, top-right) -->
  <circle cx="200" cy="95" r="72" fill="#fdf4ff" fill-opacity="0.45" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="248" y="36" font-size="12" font-weight="700" fill="#7c3aed">B</text>

  <!-- Circle C (Cricket, bottom) -->
  <circle cx="157" cy="150" r="72" fill="#fef9c3" fill-opacity="0.45" stroke="#b45309" stroke-width="1.8"/>
  <text x="152" y="208" font-size="12" font-weight="700" fill="#b45309">C</text>

  <!-- F only: 18 -->
  <text x="62" y="90" text-anchor="middle" font-size="13" fill="#334155">18</text>

  <!-- B only: 12 -->
  <text x="252" y="90" text-anchor="middle" font-size="13" fill="#334155">12</text>

  <!-- C only: 14 -->
  <text x="157" y="185" text-anchor="middle" font-size="13" fill="#334155">14</text>

  <!-- F∩B only: 10 -->
  <text x="157" y="62" text-anchor="middle" font-size="13" fill="#334155">10</text>

  <!-- F∩C only: 12 -->
  <text x="90" y="152" text-anchor="middle" font-size="13" fill="#334155">12</text>

  <!-- B∩C only: 8 -->
  <text x="224" y="152" text-anchor="middle" font-size="13" fill="#334155">8</text>

  <!-- F∩B∩C: 8 -->
  <text x="157" y="115" text-anchor="middle" font-size="13" fill="#334155">8</text>

  <!-- None: 8 -->
  <text x="20" y="190" font-size="11" fill="#64748b">8 play none</text>
</svg>
