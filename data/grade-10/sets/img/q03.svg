<svg viewBox="0 0 300 175" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Universe rectangle -->
  <rect x="5" y="5" width="290" height="165" rx="6" fill="none" stroke="#334155" stroke-width="1.8"/>
  <text x="14" y="20" font-size="12" font-weight="700" fill="#334155">U</text>

  <!-- Circle A (left) -->
  <circle cx="115" cy="88" r="66" fill="#e0f2fe" fill-opacity="0.5" stroke="#0d9488" stroke-width="1.8"/>
  <text x="60" y="32" font-size="13" font-weight="700" fill="#0d9488">A</text>

  <!-- Circle B (right) -->
  <circle cx="190" cy="88" r="66" fill="#fdf4ff" fill-opacity="0.5" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="237" y="32" font-size="13" font-weight="700" fill="#7c3aed">B</text>

  <!-- A only region: {2, 4, 8, 10} -->
  <text x="67" y="75" text-anchor="middle" font-size="11" fill="#334155">2</text>
  <text x="67" y="90" text-anchor="middle" font-size="11" fill="#334155">4</text>
  <text x="67" y="105" text-anchor="middle" font-size="11" fill="#334155">8</text>
  <text x="67" y="120" text-anchor="middle" font-size="11" fill="#334155">10</text>

  <!-- A∩B region: {6, 12} -->
  <text x="152" y="82" text-anchor="middle" font-size="11" fill="#334155">6</text>
  <text x="152" y="98" text-anchor="middle" font-size="11" fill="#334155">12</text>

  <!-- B only region: {3, 9} -->
  <text x="238" y="82" text-anchor="middle" font-size="11" fill="#334155">3</text>
  <text x="238" y="98" text-anchor="middle" font-size="11" fill="#334155">9</text>

  <!-- Outside: {1, 5, 7, 11} -->
  <text x="18" y="148" font-size="11" fill="#334155">1</text>
  <text x="38" y="148" font-size="11" fill="#334155">5</text>
  <text x="260" y="148" font-size="11" fill="#334155">7</text>
  <text x="278" y="148" font-size="11" fill="#334155">11</text>
</svg>
