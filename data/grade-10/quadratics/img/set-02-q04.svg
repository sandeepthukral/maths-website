<svg viewBox="0 0 280 155" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Wall (left side) -->
  <line x1="30" y1="20" x2="30" y2="130" stroke="#334155" stroke-width="4"/>
  <text x="10" y="80" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">wall</text>

  <!-- Fenced three sides -->
  <!-- Top fence -->
  <line x1="30" y1="25" x2="230" y2="25" stroke="#0d9488" stroke-width="2.2"/>
  <!-- Right fence -->
  <line x1="230" y1="25" x2="230" y2="125" stroke="#0d9488" stroke-width="2.2"/>
  <!-- Bottom fence -->
  <line x1="30" y1="125" x2="230" y2="125" stroke="#0d9488" stroke-width="2.2"/>

  <!-- Interior fill -->
  <rect x="30" y="25" width="200" height="100" fill="#f0fdfa" fill-opacity="0.6"/>

  <!-- Dimension labels -->
  <!-- Width x (top arrow) -->
  <line x1="30" y1="10" x2="230" y2="10" stroke="#475569" stroke-width="1" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <text x="130" y="8" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">length = 40 − 2x</text>

  <!-- Height x (right side) -->
  <line x1="248" y1="25" x2="248" y2="125" stroke="#475569" stroke-width="1"/>
  <text x="260" y="78" text-anchor="middle" font-size="11" fill="#7c3aed" font-style="italic">x</text>
  <line x1="244" y1="25" x2="252" y2="25" stroke="#475569" stroke-width="1"/>
  <line x1="244" y1="125" x2="252" y2="125" stroke="#475569" stroke-width="1"/>

  <!-- Bottom x label (left side width) -->
  <text x="16" y="82" text-anchor="middle" font-size="11" fill="#7c3aed" font-style="italic">x</text>

  <!-- Area label -->
  <text x="130" y="78" text-anchor="middle" font-size="12" fill="#475569">A = ?</text>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
</svg>
