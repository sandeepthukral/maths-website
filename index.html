<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maths Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <div class="page-head">
      <h1 class="page-title">Maths Practice</h1>
      <p class="page-subtitle">Choose a grade to get started</p>
    </div>
    <div class="cards-grid" id="grades-grid">
      <p class="loading">Loading…</p>
    </div>
    <div class="test-promo">
      <a href="test.html" class="test-promo-link">
        <div class="test-promo__icon">✎</div>
        <div class="test-promo__body">
          <strong>Practice Test</strong>
          <span>10 random questions from any topic — you choose the difficulty</span>
        </div>
        <span class="test-promo__arrow">→</span>
      </a>
    </div>
  </div>

  <script>
    async function init() {
      const grid = document.getElementById('grades-grid');
      try {
        const manifest = await fetch('manifest.json').then(r => r.json());

        if (!manifest.grades.length) {
          grid.innerHTML = '<p class="empty">No grades found. Add a folder to data/ and run generate_manifest.js.</p>';
          return;
        }

        grid.innerHTML = manifest.grades.map(grade => {
          const topicCount = grade.topics.length;
          const topicWord  = topicCount === 1 ? 'topic' : 'topics';
          const totalSets  = grade.topics.reduce((n, t) => n + t.sets.length, 0);
          const setWord    = totalSets === 1 ? 'set' : 'sets';
          return `
            <a class="topic-card fade-in" href="grade.html?grade=${grade.slug}"
               style="--topic-color: ${grade.color || '#6366f1'}">
              <div class="topic-card__stripe"></div>
              <div class="topic-card__body">
                <h2 class="topic-card__title">${grade.title}</h2>
                <p class="topic-card__desc">${topicCount} ${topicWord} · ${totalSets} ${setWord}</p>
                <div class="topic-card__footer">
                  <span class="topic-card__count"></span>
                  <span class="topic-card__arrow">→</span>
                </div>
              </div>
            </a>
          `;
        }).join('');
      } catch (err) {
        grid.innerHTML = `<p class="empty">Could not load manifest.json — make sure the server is running.<br><small>${err.message}</small></p>`;
      }
    }

    init();
  </script>
</body>
</html>
