<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic — Maths Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <nav class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="breadcrumb-sep">/</span>
      <a href="#" id="bc-grade-link">…</a>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-current" id="bc-topic">…</span>
    </nav>

    <div id="topic-banner"></div>
    <div id="sets-list"><p class="loading">Loading…</p></div>
  </div>

  <script>
    async function init() {
      const params    = new URLSearchParams(window.location.search);
      const gradeSlug = params.get('grade');
      const topicSlug = params.get('slug');
      const setsList  = document.getElementById('sets-list');

      try {
        const manifest = await fetch('manifest.json').then(r => r.json());
        const grade    = manifest.grades.find(g => g.slug === gradeSlug);
        const topic    = grade?.topics.find(t => t.slug === topicSlug);

        if (!topic) {
          setsList.innerHTML = '<p class="empty">Topic not found.</p>';
          return;
        }

        document.documentElement.style.setProperty('--topic-color', topic.color);
        document.title = `${topic.title} — Maths Practice`;

        const gradeLink = document.getElementById('bc-grade-link');
        gradeLink.textContent = grade.title;
        gradeLink.href = `grade.html?grade=${gradeSlug}`;
        document.getElementById('bc-topic').textContent = topic.title;

        document.getElementById('topic-banner').innerHTML = `
          <div class="topic-banner">
            <div class="topic-banner__stripe"></div>
            <div class="topic-banner__content">
              <h1>${topic.title}</h1>
              <p>${topic.description}</p>
            </div>
          </div>
        `;

        if (!topic.sets.length) {
          setsList.innerHTML = '<p class="empty">No sets yet for this topic.</p>';
          return;
        }

        setsList.innerHTML = topic.sets.map(set => {
          const num    = set.id.replace('set-', '');
          const badges = set.categories
            .map(c => `<span class="badge badge-${c.replace(/\s+/g, '-')}">${c}</span>`)
            .join('');
          return `
            <a class="set-card fade-in"
               href="practice.html?grade=${gradeSlug}&topic=${topicSlug}&set=${set.id}">
              <div class="set-card__num">${num}</div>
              <div class="set-card__body">
                <div class="set-card__title">${set.title}</div>
                <div class="set-card__meta">
                  <span class="set-card__q-count">${set.questionCount} questions</span>
                  ${badges}
                </div>
              </div>
              <div class="set-card__arrow">→</div>
            </a>
          `;
        }).join('');

      } catch (err) {
        setsList.innerHTML = `<p class="empty">Failed to load topic.<br><small>${err.message}</small></p>`;
      }
    }

    init();
  </script>
</body>
</html>
